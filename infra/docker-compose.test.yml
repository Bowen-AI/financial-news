# Lightweight Docker Compose for integration tests (no Ollama, no app containers)
services:
  test-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: fnews
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: fnews_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fnews -d fnews_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
