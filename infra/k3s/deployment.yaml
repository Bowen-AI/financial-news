---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: fnews
---
# ConfigMap for environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: fnews-config
  namespace: fnews
data:
  LLM_BACKEND: "ollama"
  LLM_MODEL_NAME: "llama3"
  EMBEDDING_MODEL_NAME: "BAAI/bge-small-en-v1.5"
  ALERT_THRESHOLD: "70"
  ALERT_MIN_SOURCES: "2"
  BLOB_STORE_PATH: "/data/blobs"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"
  EVAL_WINDOW_DAYS: "7"
  LOG_LEVEL: "INFO"
---
# Secret (fill in before applying)
apiVersion: v1
kind: Secret
metadata:
  name: fnews-secrets
  namespace: fnews
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://fnews:CHANGEME@fnews-db:5432/fnews"
  REDIS_URL: "redis://fnews-redis:6379/0"
  EMAIL_SMTP_PASS: "CHANGEME"
  EMAIL_IMAP_PASS: "CHANGEME"
  API_KEY: "CHANGEME"
---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fnews-db
  namespace: fnews
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fnews-db
  template:
    metadata:
      labels:
        app: fnews-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          env:
            - name: POSTGRES_USER
              value: fnews
            - name: POSTGRES_DB
              value: fnews
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fnews-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: fnews-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: fnews-db
  namespace: fnews
spec:
  selector:
    app: fnews-db
  ports:
    - port: 5432
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fnews-redis
  namespace: fnews
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fnews-redis
  template:
    metadata:
      labels:
        app: fnews-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: fnews-redis
  namespace: fnews
spec:
  selector:
    app: fnews-redis
  ports:
    - port: 6379
---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fnews-api
  namespace: fnews
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fnews-api
  template:
    metadata:
      labels:
        app: fnews-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: financial-news:latest
          command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: fnews-config
            - secretRef:
                name: fnews-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fnews-api
  namespace: fnews
spec:
  selector:
    app: fnews-api
  ports:
    - port: 8000
  type: ClusterIP
