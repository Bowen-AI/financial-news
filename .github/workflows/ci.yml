name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Unit tests (no external services needed) ─────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install sqlalchemy pgvector pydantic-settings structlog pyyaml \
                      pytest pytest-asyncio pytest-mock httpx anyio

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select E,F,W --ignore E501

  # ── Integration tests (Postgres + pgvector service) ──────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: fnews
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fnews_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fnews:testpass@localhost:5432/fnews_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-api-key
      LLM_BACKEND: ollama
      LLM_BASE_URL: http://localhost:11434
      LLM_MODEL_NAME: llama3
      EMBEDDING_MODEL_NAME: BAAI/bge-small-en-v1.5
      ALERT_THRESHOLD: "70"
      ALERT_MIN_SOURCES: "2"
      SOURCE_CONFIG_PATH: config/sources.example.yaml
      WATCHLIST_CONFIG_PATH: config/watchlist.example.yaml
      BLOB_STORE_PATH: /tmp/test-blobs
      EMAIL_SMTP_HOST: smtp.example.com
      EMAIL_SMTP_PORT: "587"
      EMAIL_SMTP_USER: test@example.com
      EMAIL_SMTP_PASS: testpass
      EMAIL_FROM: test@example.com
      EMAIL_TO: test@example.com
      EMAIL_IMAP_HOST: imap.example.com
      EMAIL_IMAP_PORT: "993"
      EMAIL_IMAP_USER: test@example.com
      EMAIL_IMAP_PASS: testpass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install sqlalchemy[asyncio] asyncpg pgvector alembic \
                      pydantic-settings structlog pyyaml httpx anyio \
                      fastapi uvicorn[standard] celery[redis] redis feedparser \
                      trafilatura python-dateutil \
                      pytest pytest-asyncio pytest-mock

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U fnews; do
            echo "Waiting for postgres..."; sleep 2
          done

      - name: Run Alembic migrations
        run: |
          alembic upgrade head

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short

  # ── Docker build smoke test ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f infra/Dockerfile -t fnews:ci .

      - name: Smoke test image
        run: |
          docker run --rm fnews:ci python -c "
          from packages.core import get_settings
          from packages.ingestion.dedup import canonical_url
          from packages.rag.chunker import chunk_text
          print('Image OK')
          "
